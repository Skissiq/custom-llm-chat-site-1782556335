<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 聊天室 (行動優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { position: fixed; width: 100%; height: 100%; overflow: hidden; }
        .chat-container { height: calc(100vh - 180px); -webkit-overflow-scrolling: touch; }
        .message-bubble { max-width: 85%; word-wrap: break-word; border-radius: 1rem; font-size: 15px; }
        .user-message { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .ai-message { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
        .loading-dots span { animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-5xl mx-auto h-full flex flex-col bg-white shadow-xl">
        <header class="p-4 border-b bg-white flex items-center justify-between shadow-sm">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i class="fas fa-brain"></i></div>
                <div>
                    <h1 class="font-bold text-base text-gray-800">Advanced Local LLM</h1>
                    <div id="status-container" class="flex items-center space-x-1">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></span>
                        <span id="status-text" class="text-[10px] text-gray-500 font-bold uppercase">初始化中...</span>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="text-gray-400 p-2"><i class="fas fa-sync-alt"></i></button>
        </header>

        <div id="loading-overlay" class="p-3 bg-indigo-50 border-b">
            <div class="flex justify-between mb-1">
                <span id="progress-label" class="text-[10px] font-bold text-indigo-700">正在下載 AI 模型 (僅第一次)...</span>
                <span id="progress-percent" class="text-[10px] font-bold text-indigo-700">0%</span>
            </div>
            <div class="w-full bg-indigo-200 rounded-full h-1">
                <div id="progress-bar" class="bg-indigo-600 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-4 flex flex-col space-y-4 bg-slate-50">
            <div class="ai-message message-bubble p-3 shadow-sm">
                你好！我是你的自製大模型。我完全運行在你的瀏覽器中，不依賴任何伺服器。
            </div>
        </div>

        <div class="p-4 border-t bg-white pb-8 md:pb-4">
            <form id="chat-form" class="flex space-x-2">
                <input type="text" id="user-input" disabled class="flex-1 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm disabled:bg-gray-50" placeholder="請等待載入...">
                <button type="submit" id="send-btn" disabled class="bg-indigo-600 text-white rounded-xl px-5 py-3 shadow-md disabled:opacity-50"><i class="fas fa-paper-plane"></i></button>
            </form>
            <div id="error-display" class="hidden mt-2 text-[10px] text-red-500 text-center font-mono"></div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        // 行動端優化設定
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const sendBtn = document.getElementById('send-btn');
        const errorDisplay = document.getElementById('error-display');

        let generator;

        async function init() {
            try {
                statusText.innerText = "正在準備引擎...";
                generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            progressBar.style.width = p + '%';
                            progressPercent.innerText = p + '%';
                        }
                        if (data.status === 'ready') {
                            statusText.innerText = "載入成功";
                            statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                            loadingOverlay.classList.add('hidden');
                            userInput.disabled = false;
                            sendBtn.disabled = false;
                            userInput.placeholder = "輸入訊息...";
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                statusText.innerText = "載入失敗";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                errorDisplay.innerText = "Error: " + err.message;
                errorDisplay.classList.remove('hidden');
            }
        }

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message-bubble p-3 shadow-sm ' + (isUser ? 'user-message' : 'ai-message');
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !generator) return;

            appendMessage(text, true);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiBubble = appendMessage('<span class="loading-dots">思考中<span>.</span><span>.</span><span>.</span></span>', false);

            try {
                const prompt = '<|im_start|>user\n' + text + '<|im_end|>\n<|im_start|>assistant\n';
                const output = await generator(prompt, {
                    max_new_tokens: 128, // 行動端限制長度以提升速度
                    temperature: 0.6,
                    do_sample: true,
                });
                const response = output[0].generated_text.split('<|im_start|>assistant\n')[1] || "無法生成回應。";
                aiBubble.innerHTML = response.trim();
            } catch (err) {
                aiBubble.innerHTML = "生成出錯：" + err.message;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });

        init();
    </script>
</body>
</html>
