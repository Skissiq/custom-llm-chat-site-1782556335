<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真正的自製大模型 (Browser AI)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .message-bubble { max-width: 85%; word-wrap: break-word; border-radius: 1rem; }
        .user-message { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .ai-message { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 0.2rem; }
        .loading-dots span { animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">
    <div class="max-w-5xl mx-auto h-screen flex flex-col shadow-2xl bg-white">
        <header class="p-5 border-b bg-white flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-brain text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl text-gray-800">Advanced Local LLM</h1>
                    <div id="status-badge" class="flex items-center space-x-2 mt-1">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                        </span>
                        <span id="status-text" class="text-xs font-medium text-gray-500 uppercase tracking-wider">正在初始化引擎...</span>
                    </div>
                </div>
            </div>
            <div id="model-info" class="hidden md:block text-right">
                <p class="text-[10px] text-gray-400">Model: SmolLM-135M-Instruct</p>
                <p class="text-[10px] text-gray-400">Powered by Transformers.js</p>
            </div>
        </header>
        <div id="loading-overlay" class="p-4 bg-indigo-50 border-b hidden">
            <div class="flex justify-between mb-1">
                <span class="text-xs font-medium text-indigo-700">正在下載 AI 大腦 (僅第一次需要)...</span>
                <span id="progress-percent" class="text-xs font-medium text-indigo-700">0%</span>
            </div>
            <div class="w-full bg-indigo-200 rounded-full h-1.5">
                <div id="progress-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
        <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-6 flex flex-col space-y-6 bg-slate-50/50">
            <div class="ai-message message-bubble p-4 shadow-sm">
                您好！我是一個完全運行在您瀏覽器中的大語言模型。<br><br>
                我不需要伺服器，您的隱私非常安全。當模型載入完成後，您可以問我常識、數學或請我寫作。
            </div>
        </div>
        <div class="p-6 border-t bg-white">
            <form id="chat-form" class="flex space-x-4">
                <input type="text" id="user-input" disabled class="flex-1 border border-gray-200 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all disabled:bg-gray-100 disabled:cursor-not-allowed" placeholder="請等待模型載入完成...">
                <button type="submit" id="send-btn" disabled class="bg-indigo-600 text-white rounded-2xl px-8 py-4 flex items-center justify-center hover:bg-indigo-700 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-paper-plane mr-2"></i> 發送
                </button>
            </form>
        </div>
    </div>
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusBadge = document.querySelector('#status-badge span span:last-child');
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const sendBtn = document.getElementById('send-btn');
        let generator;
        async function initModel() {
            try {
                loadingOverlay.classList.remove('hidden');
                statusText.innerText = "正在載入 AI 模型...";
                generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            progressBar.style.width = p + '%';
                            progressPercent.innerText = p + '%';
                        }
                    }
                });
                statusText.innerText = "AI 引擎已就緒";
                statusText.classList.replace('text-gray-500', 'text-green-600');
                statusBadge.classList.replace('bg-yellow-500', 'bg-green-500');
                loadingOverlay.classList.add('hidden');
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "輸入您的問題...";
            } catch (err) {
                console.error(err);
                statusText.innerText = "載入失敗，請刷新頁面";
            }
        }
        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message-bubble p-4 shadow-sm ' + (isUser ? 'user-message' : 'ai-message');
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !generator) return;
            appendMessage(text, true);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            const aiBubble = appendMessage('<span class="loading-dots">思考中<span>.</span><span>.</span><span>.</span></span>', false);
            try {
                const prompt = '<|im_start|>user\n' + text + '<|im_end|>\n<|im_start|>assistant\n';
                const output = await generator(prompt, {
                    max_new_tokens: 256,
                    temperature: 0.7,
                    repetition_penalty: 1.2,
                    do_sample: true,
                    top_k: 50,
                });
                const fullResponse = output[0].generated_text;
                const response = fullResponse.split('<|im_start|>assistant\n')[1] || "抱歉，我現在無法回答。";
                aiBubble.innerHTML = response.trim();
            } catch (err) {
                aiBubble.innerHTML = "發生錯誤：" + err.message;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });
        initModel();
    </script>
</body>
</html>
