<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 助手 (穩定極速版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { position: fixed; width: 100%; height: 100%; overflow: hidden; background-color: #f0f2f5; }
        .chat-container { height: calc(100vh - 180px); -webkit-overflow-scrolling: touch; }
        .message-bubble { max-width: 85%; word-wrap: break-word; border-radius: 1.2rem; font-size: 15px; line-height: 1.5; }
        .user-message { background: #1877f2; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .ai-message { background: #ffffff; color: #1c1e21; align-self: flex-start; border-bottom-left-radius: 0.2rem; border: 1px solid #dddfe2; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
        .loading-dots span { animation: blink 1.4s infinite both; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="font-sans">
    <div class="max-w-4xl mx-auto h-full flex flex-col bg-white shadow-lg">
        <header class="p-4 border-b bg-white flex items-center justify-between z-10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-md"><i class="fas fa-robot"></i></div>
                <div>
                    <h1 class="font-bold text-base">Stable AI Chat</h1>
                    <div id="status-container" class="flex items-center space-x-1">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></span>
                        <span id="status-text" class="text-[10px] text-gray-500 font-bold uppercase">正在建立連線...</span>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="text-gray-400 p-2"><i class="fas fa-sync-alt"></i></button>
        </header>

        <div id="loading-overlay" class="p-3 bg-blue-50 border-b">
            <div class="flex justify-between mb-1">
                <span id="progress-label" class="text-[10px] font-bold text-blue-700">正在下載 AI 大腦 (約 180MB)...</span>
                <span id="progress-percent" class="text-[10px] font-bold text-blue-700">0%</span>
            </div>
            <div class="w-full bg-blue-200 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-4 flex flex-col space-y-4 bg-gray-50">
            <div class="ai-message message-bubble p-4 shadow-sm">
                你好！我是 TinyLlama。我是一個完全開放、穩定的 AI 模型。
                我現在已經針對你的設備進行了優化，請稍等載入完成。
            </div>
        </div>

        <div class="p-4 border-t bg-white pb-8 md:pb-4">
            <form id="chat-form" class="flex space-x-2">
                <input type="text" id="user-input" disabled class="flex-1 border border-gray-200 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm disabled:bg-gray-50" placeholder="等待模型載入...">
                <button type="submit" id="send-btn" disabled class="bg-blue-600 text-white rounded-xl px-5 py-3 shadow-md disabled:opacity-50"><i class="fas fa-paper-plane"></i></button>
            </form>
            <div id="error-display" class="hidden mt-2 p-2 bg-red-50 rounded text-[10px] text-red-600 text-center font-mono border border-red-100"></div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        // 極致穩定性設定
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const sendBtn = document.getElementById('send-btn');
        const errorDisplay = document.getElementById('error-display');

        let generator;

        async function init() {
            try {
                statusText.innerText = "準備模型引擎...";
                // 使用 TinyLlama-1.1B-Chat-v1.0 的量化版，它是目前最穩定的開源選擇
                generator = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                    quantized: true,
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            progressBar.style.width = p + '%';
                            progressPercent.innerText = p + '%';
                        }
                        if (data.status === 'ready') {
                            statusText.innerText = "AI 已就緒";
                            statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                            loadingOverlay.classList.add('hidden');
                            userInput.disabled = false;
                            sendBtn.disabled = false;
                            userInput.placeholder = "輸入訊息...";
                            userInput.focus();
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                statusText.innerText = "啟動失敗";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                errorDisplay.innerText = "錯誤訊息: " + err.message + "\n請嘗試切換網路或刷新。";
                errorDisplay.classList.remove('hidden');
            }
        }

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message-bubble p-4 shadow-sm ' + (isUser ? 'user-message' : 'ai-message');
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !generator) return;

            appendMessage(text, true);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiBubble = appendMessage('<span class="loading-dots">思考中<span>.</span><span>.</span><span>.</span></span>', false);

            try {
                // TinyLlama Prompt 格式
                const prompt = `<|system|>\nYou are a helpful assistant.</s>\n<|user|>\n${text}</s>\n<|assistant|>\n`;

                const output = await generator(prompt, {
                    max_new_tokens: 128,
                    temperature: 0.7,
                    do_sample: true,
                    top_k: 50,
                });

                const response = output[0].generated_text.split('<|assistant|>\n')[1] || "Sorry, I can't answer that.";
                aiBubble.innerHTML = response.trim();
            } catch (err) {
                aiBubble.innerHTML = "生成出錯：" + err.message;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        });

        init();
    </script>
</body>
</html>
