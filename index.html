<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自製大模型聊天室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 160px); }
        .message-bubble { max-width: 80%; word-wrap: break-word; }
        .user-message { background-color: #3b82f6; color: white; align-self: flex-end; border-radius: 20px 20px 0 20px; }
        .ai-message { background-color: #f3f4f6; color: #1f2937; align-self: flex-start; border-radius: 20px 20px 20px 0; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-4xl mx-auto h-screen flex flex-col shadow-xl bg-white">
        <header class="p-4 border-b bg-white flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white"><i class="fas fa-robot"></i></div>
                <div>
                    <h1 class="font-bold text-lg text-gray-800">MyCustomLLM v1.0</h1>
                    <p class="text-xs text-green-500 flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span> 線上</p>
                </div>
            </div>
        </header>
        <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-4 flex flex-col space-y-4 bg-gray-50">
            <div class="ai-message message-bubble p-3 shadow-sm">你好！我是你的自製大模型。</div>
        </div>
        <div class="p-4 border-t bg-white">
            <form id="chat-form" class="flex space-x-3">
                <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入訊息..." required>
                <button type="submit" class="bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-blue-700 transition shadow-md"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message-bubble p-3 shadow-sm ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;
            appendMessage(message, true);
            userInput.value = '';
            setTimeout(() => { appendMessage("收到您的訊息： " + message, false); }, 600);
        });
    </script>
</body>
</html>
